name: messenger
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+17

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_crashlytics: ^5.2.0
  google_sign_in: ^6.2.2
  googleapis_auth: ^1.6.0
  sign_in_with_apple: ^6.1.4
  intl_phone_field: ^3.2.0
  shared_preferences: ^2.2.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  firebase_messaging: 16.1.2
  share_plus: ^10.0.0
  rxdart: ^0.28.0
  http: ^1.2.2
  file_picker: ^8.0.0
  open_filex: ^4.3.4
  just_audio: ^0.9.40
  agora_rtc_engine: 6.5.3
  crypto: ^3.0.6
  flutter_callkit_incoming: ^3.0.0
  record: ^6.1.1
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0+10
  video_player: ^2.8.6
  geolocator: ^13.0.2
  google_mobile_ads: ^5.3.0
  google_mlkit_language_id: ^0.13.0
  google_mlkit_translation: ^0.13.1
  permission_handler: ^11.3.1
  gal: ^2.3.0
  dio: ^5.4.3

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_analytics: ^12.3.0
  cloud_functions: ^6.0.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  flutter_linkify: ^6.0.0
  linkify: ^5.0.0
  any_link_preview: ^3.0.3
  google_places_flutter: ^2.1.1
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  firebase_storage: ^13.1.0
  video_compress: ^3.1.4
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  perfect_freehand: ^2.5.2+1
  package_info_plus: ^9.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.1
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

dependency_overrides:
  firebase_auth:
    path: third_party/firebase_auth
  firebase_auth_platform_interface:
    path: third_party/firebase_auth_platform_interface

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/answer_icon.png"  
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:  
  assets:
    - assets/images/answer_logo.png
    - assets/markdown/
  uses-material-design: true

msix_config:
  display_name: Answer
  publisher_display_name: Answer
  identity_name: com.answer.app
  msix_version: 1.0.0.0
  logo_path: assets/images/answer_icon.png
  capabilities: internetClient, microphone, webcam
